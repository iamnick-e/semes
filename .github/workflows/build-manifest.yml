name: Build sounds manifest

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build sounds.json
        run: python3 scripts/build-manifest.py

      - name: Commit sounds.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/sounds.json
          git diff --cached --quiet || git commit -m "chore: rebuild sounds.json manifest"
          git push
