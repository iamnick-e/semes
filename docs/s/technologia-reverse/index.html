<!DOCTYPE html>
<html lang="en"><head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>🔄 Technologia Reverse — Semes</title>
  <meta property="og:title" content="🔄 Technologia Reverse"/>
  <meta property="og:audio" content="https://iamnick-e.github.io/semes/sounds/technologia-reverse.mp3"/>
  <meta property="og:audio:type" content="audio/mpeg"/>
  <style>*{margin:0;padding:0;box-sizing:border-box}body{background:#111318;color:#e8e8ec;font-family:system-ui;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.25rem;padding:1.5rem}.player{background:#1e2028;border:1.5px solid #2e3040;border-radius:14px;padding:1.5rem 2rem;display:flex;flex-direction:column;align-items:center;gap:1rem;width:100%;max-width:420px}.sound-emoji{font-size:3rem}.sound-name{font-size:1.15rem;font-weight:700;text-align:center}.btn-play{background:#ff6622;color:#fff;border:none;border-radius:50%;width:64px;height:64px;cursor:pointer;font-size:1.5rem}.progress-wrap{width:100%;height:4px;background:#2e3040;border-radius:2px;overflow:hidden}.progress-fill{height:100%;background:#ff6622;width:0%}.back-link{display:inline-flex;align-items:center;gap:.5rem;background:#1e2028;border:1.5px solid #2e3040;border-radius:10px;padding:.65rem 1.25rem;color:#e8e8ec;text-decoration:none;font-size:.95rem;font-weight:600;transition:border-color .15s,background .15s}.back-link:hover{border-color:#ff6622;background:#252830}.back-link span{font-size:1.1rem}</style>
</head><body>
  <div class="player"><div class="sound-emoji">🔄</div><div class="sound-name">Technologia Reverse</div>
    <button class="btn-play" id="btn">▶</button>
    <div class="progress-wrap"><div class="progress-fill" id="prog"></div></div>
  </div>
  <div style="text-align:center">
  <a class="back-link" href="../../"><span>🔊</span> Semes Soundboard</a>
  <p style="font-size:.75rem;color:#555;margin-top:.5rem">500+ instant sound buttons</p>
</div>
  <script>
    const btn=document.getElementById('btn'),prog=document.getElementById('prog');let audio=null;
    
    // Track play count
    const COUNTS_API = 'https://semes-counts.nick-f16.workers.dev';
    const slug = location.pathname.replace(/\/+$/,'').split('/').pop();
    function trackPlay() {
      if (!COUNTS_API) return;
      fetch(COUNTS_API + '/' + slug, { method: 'POST' }).catch(() => {});
    }
    function start(){audio=new Audio('../../sounds/technologia-reverse.mp3');btn.textContent='⏸';audio.addEventListener('timeupdate',()=>{if(audio.duration)prog.style.width=(audio.currentTime/audio.duration*100)+'%'});audio.addEventListener('ended',()=>{btn.textContent='▶';prog.style.width='0%';audio=null});return audio.play()}
    btn.addEventListener('click',()=>{if(audio&&!audio.paused){audio.pause();audio.currentTime=0;btn.textContent='▶';return}start().then(()=>trackPlay()).catch(()=>{});});
    window.addEventListener('load',()=>start().then(()=>trackPlay()).catch(()=>{btn.textContent='▶'}));
  </script>
</body></html>
