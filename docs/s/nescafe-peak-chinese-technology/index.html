  <style>*{margin:0;padding:0;box-sizing:border-box}body{background:#111318;color:#e8e8ec;font-family:system-ui;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.25rem;padding:1.5rem}.player{background:#1e2028;border:1.5px solid #2e3040;border-radius:14px;padding:1.5rem 2rem;display:flex;flex-direction:column;align-items:center;gap:1rem;width:100%;max-width:420px}.sound-emoji{font-size:3rem}.sound-name{font-size:1.15rem;font-weight:700;text-align:center}.btn-play{background:#ff6622;color:#fff;border:none;border-radius:50%;width:64px;height:64px;cursor:pointer;font-size:1.5rem}.progress-wrap{width:100%;height:4px;background:#2e3040;border-radius:2px;overflow:hidden}.progress-fill{height:100%;background:#ff6622;width:0%}.back-link{font-size:.8rem;color:#555;text-decoration:none}</style>

  <a class="back-link" href="../../">← Back to Semes soundboard</a>
  <script>
    const btn=document.getElementById('btn'),prog=document.getElementById('prog');let audio=null;
    function start(){audio=new Audio('../../sounds/nescafe-ad-peak-chinese-technology.mp3');btn.textContent='⏸';audio.addEventListener('timeupdate',()=>{if(audio.duration)prog.style.width=(audio.currentTime/audio.duration*100)+'%'});audio.addEventListener('ended',()=>{btn.textContent='▶';prog.style.width='0%';audio=null});return audio.play()}
    btn.addEventListener('click',()=>{if(audio&&!audio.paused){audio.pause();audio.currentTime=0;btn.textContent='▶';return}start().catch(()=>{});});
    window.addEventListener('load',()=>start().catch(()=>{btn.textContent='▶'}));
  </script>
